
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - Philippine Wildlife</title>

  <!-- Bootstrap (for form styling only) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: url('https://images.unsplash.com/photo-1502082553048-f009c37129b9') no-repeat center center/cover;
      font-family: Arial, sans-serif;
    }

    /* NAVBAR */
    .nav-container {
      background: #198754;
      color: white;
      padding: 10px 20px;
      position: relative;
    }

    .logo {
      font-weight: bold;
      font-size: 18px;
    }

    #menu-toggle {
      display: none;
    }

    .menu-icon {
      font-size: 24px;
      cursor: pointer;
      position: absolute;
      right: 20px;
      top: 10px;
    }

    .nav-menu {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
      display: none;
    }

    .nav-menu li {
      margin: 10px 0;
    }

    .nav-menu a {
      color: white;
      text-decoration: none;
    }

    #menu-toggle:checked + .menu-icon + .nav-menu {
      display: block;
    }

    @media (min-width: 768px) {
      .menu-icon {
        display: none;
      }

      .nav-menu {
        display: flex;
        gap: 20px;
        justify-content: flex-end;
        margin: 0;
      }

      .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
    }

    /* MAIN CONTENT */
    .overlay {
      background: rgba(255,255,255,0.85);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-card {
      max-width: 400px;
      border-radius: 12px;
      border: 2px solid #333;
      padding: 20px;
      background: #fff;
      text-align: center;
    }

    .title-line {
      width: 50px;
      height: 3px;
      background: green;
      margin: 10px auto 20px;
    }

    .btn-green {
      background: #198754;
      color: white;
      border-radius: 8px;
      padding: 8px 20px;
    }

    .btn-green:hover {
      background: #157347;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav-container">
  <div class="logo">Wildlife PH</div>

  <input type="checkbox" id="menu-toggle">
  <label for="menu-toggle" class="menu-icon">☰</label>

  <ul class="nav-menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</div>

<!-- CONTENT -->
<div class="overlay">
  <div class="main-card">

    <h4>Contact Us</h4>
    <div class="title-line"></div>

    <p style="font-size: 13px;">
      Have questions or want to help protect wildlife? Send us a message.
    </p>

    <hr>

    <!-- FORM -->
    <form>
      <input type="text" placeholder="Your Name" required class="form-control mb-2">
      <input type="email" placeholder="Your Email" required class="form-control mb-2">
      <textarea placeholder="Your Message" required class="form-control mb-2"></textarea>

      <button type="submit" class="btn btn-green">Send Message</button>
    </form>

    <hr>

    <!-- CONTACT INFO -->
    <p style="font-size: 13px;">
      Email: wildlife@email.com <br>
      Phone: +63 912 345 6789 <br>
      Location: Philippines
    </p>

  </div>
</div>

</body>
</html>
